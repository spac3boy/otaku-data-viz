  <text x="96" y="462" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="900" fill="#090b09">A fan-made history map</text>
  <text x="96" y="502" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="900" fill="#090b09">of titles, eras, and hits</text>
