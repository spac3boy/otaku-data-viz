<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Pokedex Type Treemap Pinterest preview</title>
  <desc id="desc">Vertical abstract Otaku Data Viz Pokédex-style treemap preview for sharing the Pokedex Type Treemap project.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#090b09" stroke-width="1" opacity=".16"/>
      <circle cx="4" cy="4" r="1.8" fill="#090b09" opacity=".2"/>
    </pattern>
  </defs>
  <rect width="1000" height="1500" fill="#fbf5e8"/>
  <rect width="1000" height="1500" fill="url(#grid)"/>
  <rect x="54" y="54" width="892" height="1392" fill="none" stroke="#090b09" stroke-width="6"/>
