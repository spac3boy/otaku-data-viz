  <text x="92" y="280" font-family="Impact, Arial Black, sans-serif" font-size="100" fill="#090b09">TYPE</text>
  <text x="92" y="380" font-family="Impact, Arial Black, sans-serif" font-size="100" fill="#090b09">TREEMAP</text>
  <text x="96" y="462" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="900" fill="#090b09">A fan-made Pokémon</text>
  <text x="96" y="502" font-family="Consolas, Menlo, monospace" font-size="28" font-weight="900" fill="#090b09">type and evolution map</text>
  <g transform="translate(128 610)" stroke="#090b09" stroke-width="7">
    <rect x="0" y="0" width="744" height="520" rx="26" fill="#d4202f"/>
